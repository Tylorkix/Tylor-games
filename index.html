<!DOCTYPE html>
<html>
<head>
    <title>How Well Do You Know Me?</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            color: white;
            background-size: cover;
            background-position: center;
            transition: background-image 1s ease-in-out;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .box {
            background: rgba(255,255,255,0.9);
            color: black;
            padding: 20px;
            margin: 40px auto;
            width: 420px;
            border-radius: 15px;
        }

        button {
            margin: 10px;
            padding: 10px;
            width: 80%;
            border: none;
            border-radius: 8px;
            background-color: #4facfe;
            color: white;
            cursor: pointer;
        }

        input {
            padding: 10px;
            width: 80%;
        }

        #timer { color: red; }

        /* 🚀 Pulsing Button */
        .deploy-btn {
            padding: 12px 20px;
            border-radius: 25px;
            background: linear-gradient(135deg, #6a5af9, #8b7bff);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            animation: pulseGlow 1.5s infinite;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px #6a5af9; }
            50% { box-shadow: 0 0 25px #8b7bff; }
            100% { box-shadow: 0 0 10px #6a5af9; }
        }

        /* Leaderboard animation */
        #leaderboardBox {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        #leaderboardBox.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .player {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #6a5af9;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
        }

        #musicToggle {
            position: fixed;
            top: 10px;
            right: 10px;
        }
    </style>
</head>

<body>

<!-- MUSIC POPUP -->
<div class="popup" id="musicPopup">
    <div class="popup-box">
        <h2>🎵 Enable Music?</h2>
        <button onclick="setMusic(true)">Yes</button>
        <button onclick="setMusic(false)">No</button>
    </div>
</div>

<button id="musicToggle" onclick="toggleMusic()" style="display:none;">🔇 Music</button>

<!-- START -->
<div class="box" id="startScreen">
    <h2>Enter Your Name</h2>
    <input type="text" id="playerName">
    <button onclick="startGame()">Start Game</button>

    <button class="deploy-btn" onclick="toggleLeaderboard(event)">
        🚀 View Friends Results
    </button>

    <div id="leaderboardBox">
        <h3>🏆 Leaderboard</h3>
        <div id="leaderboard"></div>
    </div>
</div>

<!-- QUIZ -->
<div class="box" id="quizScreen" style="display:none;">
    <h3 id="timer">Time: 10</h3>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="score"></p>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="bgMusic" src="https://files.catbox.moe/d2cjfw.m4a" loop></audio>

<script>
// 🖼️ BACKGROUND IMAGES
const images = [
    "https://files.catbox.moe/md9t5u.jpg",
    "https://files.catbox.moe/ri4psa.jpg",
    "https://files.catbox.moe/sca4v4.jpg"
];

function setRandomBackground(){
    let r = images[Math.floor(Math.random()*images.length)];
    document.body.style.backgroundImage = `url(${r})`;
}

// 🎵 MUSIC
let musicEnabled = false;

function setMusic(choice){
    musicEnabled = choice;
    document.getElementById("musicPopup").style.display="none";
    document.getElementById("musicToggle").style.display="block";
}

function toggleMusic(){
    let m=document.getElementById("bgMusic");
    musicEnabled=!musicEnabled;
    musicEnabled ? m.play() : m.pause();
}

// QUIZ DATA (EDIT THIS 👇)
const quiz=[
    {question:"Favorite color?",answers:["Red","Blue","Black"],correct:"Black"},
    {question:"Favorite food?",answers:["Pizza","Ugali","Rice"],correct:"Ugali"}
];

let player="",score=0,current=0,timeLeft=10,timer,userAnswers=[];

// START GAME
function startGame(){
    player=document.getElementById("playerName").value;
    if(!player){alert("Enter name");return;}

    document.getElementById("startScreen").style.display="none";
    document.getElementById("quizScreen").style.display="block";

    setRandomBackground();

    if(musicEnabled){
        let m=document.getElementById("bgMusic");
        m.currentTime=0;
        m.play().catch(()=>{});
    }

    loadQuestion();
}

// TIMER
function startTimer(){
    timeLeft=10;
    document.getElementById("timer").innerText="Time: "+timeLeft;

    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText="Time: "+timeLeft;

        if(timeLeft===0){
            clearInterval(timer);
            userAnswers.push("No Answer");
            nextQuestion();
        }
    },1000);
}

// LOAD QUESTION
function loadQuestion(){
    clearInterval(timer);
    startTimer();

    let q=quiz[current];
    document.getElementById("question").innerText=q.question;

    let html="";
    q.answers.forEach(a=>{
        html+=`<button onclick="checkAnswer('${a}')">${a}</button>`;
    });

    document.getElementById("answers").innerHTML=html;
}

// CHECK ANSWER
function checkAnswer(ans){
    clearInterval(timer);
    userAnswers.push(ans);

    if(ans===quiz[current].correct){
        score++;
        correctSound.play();
    }else{
        wrongSound.play();
    }

    setTimeout(nextQuestion,1000);
}

// NEXT
function nextQuestion(){
    current++;
    if(current<quiz.length){
        loadQuestion();
    }else{
        endGame();
    }
}

// END GAME
function endGame(){
    bgMusic.pause();

    let resultHTML="<h3>Your Score: "+score+"</h3><h4>Correct Answers:</h4>";

    quiz.forEach((q,i)=>{
        resultHTML+=`
        <p>
        Q: ${q.question}<br>
        Your Answer: ${userAnswers[i]}<br>
        Correct Answer: ${q.correct}
        </p>`;
    });

    document.getElementById("question").innerHTML="Game Over";
    document.getElementById("answers").innerHTML=resultHTML;

    saveScore(player,score);
    showLeaderboard();
}

// SAVE SCORE
function saveScore(name,score){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.push({name,score});
    localStorage.setItem("scores",JSON.stringify(scores));
}

// SHOW LEADERBOARD
function showLeaderboard(){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.sort((a,b)=>b.score-a.score);

    let html="";
    scores.forEach((s,i)=>{
        let medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
        html+=`
        <div class="player">
            <div class="avatar">${s.name[0].toUpperCase()}</div>
            <div>${medal} ${i+1}. ${s.name} - ${s.score}</div>
        </div>`;
    });

    document.getElementById("leaderboard").innerHTML=html;
}

// TOGGLE LEADERBOARD
function toggleLeaderboard(e){
    let box=document.getElementById("leaderboardBox");

    if(box.classList.contains("show")){
        box.classList.remove("show");
        e.target.innerText="🚀 View Other Friends Results";
    }else{
        box.classList.add("show");
        e.target.innerText="❌ Hide Results";
    }
}

// INIT
setRandomBackground();
showLeaderboard();

</script>

</body>
</html>
