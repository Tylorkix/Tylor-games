<!DOCTYPE html>
<html>
<head>
<title>Insane Quiz Game</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin:0;
    color:white;
    background-size:cover;
    background-position:center;
    transition:background-image 0.5s ease;
}

/* animated overlay */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(-45deg,#1a1a2eaa,#16213eaa,#0f3460aa,#533483aa);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    top:0;
    left:0;
    z-index:-1;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* glass card */
.box{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:30px;
    width:450px;
    margin:80px auto;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

button{
    margin:8px;
    padding:12px;
    width:85%;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#4a74b5,#5f8dd3);
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover{transform:scale(1.05);}

#question{font-size:28px;margin-bottom:20px;}

#timerBar{
    height:8px;
    width:100%;
    background:#333;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:15px;
}
#timerFill{
    height:100%;
    width:100%;
    background:#00ffcc;
    transition:width 1s linear;
}

.correct{background:green !important;}
.wrong{background:red !important;}

#adminBtn{position:fixed;top:10px;left:10px;width:auto;}
#musicToggle{position:fixed;top:10px;right:10px;width:auto;}

input{padding:10px;width:85%;margin:5px;}

#neonPopup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:black;
    color:#00fff7;
    padding:20px 40px;
    border-radius:12px;
    box-shadow:0 0 10px #00fff7,0 0 25px #00fff7;
    opacity:0;
    transition:0.4s;
}
#neonPopup.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}
</style>
</head>

<body>

<button id="adminBtn" onclick="openAdmin()">👑 Admin</button>
<button id="musicToggle" onclick="toggleMusic()">🔇 Music</button>

<div id="neonPopup"></div>

<div class="box" id="startScreen">
    <h2>Enter Name</h2>
    <input id="playerName">
    <button onclick="startGame()">Start Game</button>
</div>

<div class="box" id="quizScreen" style="display:none;">
    <h3 id="timer"></h3>
    <div id="timerBar"><div id="timerFill"></div></div>
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<div class="box" id="adminLogin" style="display:none;">
    <h2>Admin Login</h2>
    <input id="adminPass" type="password">
    <button onclick="checkAdmin()">Login</button>
</div>

<div class="box" id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>

    <input id="qText" placeholder="Question">
    <input id="opt1" placeholder="Option 1">
    <input id="opt2" placeholder="Option 2">
    <input id="opt3" placeholder="Option 3">
    <input id="opt4" placeholder="Option 4">
    <input id="correctAns" placeholder="Correct Answer">

    <button onclick="addQuestion()">Add Another Quiz</button>
    <button onclick="editQuestion()">Edit Selected Quiz</button>
    <button onclick="deleteQuestion()">Delete Selected Quiz</button>

    <h3>📋 Click Question to Edit</h3>
    <div id="questionList"></div>

    <button onclick="goHome()">Back</button>
</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="bgMusic" src="https://files.catbox.moe/d2cjfw.m4a" loop></audio>

<script>

// 🔥 BACKGROUND IMAGES
const backgrounds=[
"https://files.catbox.moe/sca4v4.jpg",
"https://files.catbox.moe/36rpa7.jpg",
"https://files.catbox.moe/ri4psa.jpg",
"https://files.catbox.moe/md9t5u.jpg"
];

function setRandomBackground(){
    document.body.style.backgroundImage=
    `url(${backgrounds[Math.floor(Math.random()*backgrounds.length)]})`;
}

// popup
function showPopup(msg){
    neonPopup.innerText=msg;
    neonPopup.classList.add("show");
    setTimeout(()=>neonPopup.classList.remove("show"),2000);
}

// music
let musicOn=false;
function toggleMusic(){
    musicOn=!musicOn;
    if(musicOn){bgMusic.play();showPopup("🎵 Music On")}
    else{bgMusic.pause();showPopup("🔇 Music Off")}
}

// storage
function getQ(){return JSON.parse(localStorage.getItem("questions"))||[];}
function saveQ(q){localStorage.setItem("questions",JSON.stringify(q));}

let selectedIndex=null;

// admin display
function loadAdmin(){
    let q=getQ();
    let html="";

    q.forEach((item,i)=>{
        let optionsHTML=item.answers.map(opt=>{
            let ok=opt===item.correct;
            return `<div style="background:${ok?'#c8f7c5':'#eee'};margin:3px;padding:5px;border-radius:5px;">
            ${ok?'✅':'•'} ${opt}</div>`;
        }).join("");

        html+=`
        <div onclick="selectQuestion(${i})"
        style="border:2px solid ${i===selectedIndex?'#6a5af9':'#ddd'};margin:10px;padding:10px;border-radius:10px;">
        <b>${i+1}. ${item.question}</b>
        ${optionsHTML}
        <div style="color:green;">✔ ${item.correct}</div>
        </div>`;
    });

    questionList.innerHTML=html;
}

function selectQuestion(i){
    let q=getQ();
    selectedIndex=i;

    let item=q[i];
    qText.value=item.question;
    opt1.value=item.answers[0]||"";
    opt2.value=item.answers[1]||"";
    opt3.value=item.answers[2]||"";
    opt4.value=item.answers[3]||"";
    correctAns.value=item.correct;

    loadAdmin();
    showPopup("✏️ Loaded");
}

function addQuestion(){
    let q=getQ();
    q.push({
        question:qText.value,
        answers:[opt1.value,opt2.value,opt3.value,opt4.value].filter(a=>a!=""),
        correct:correctAns.value
    });
    saveQ(q);
    showPopup("✨ Added");
    loadAdmin();
}

function editQuestion(){
    if(selectedIndex===null)return showPopup("Select first");

    let q=getQ();
    q[selectedIndex]={
        question:qText.value,
        answers:[opt1.value,opt2.value,opt3.value,opt4.value].filter(a=>a!=""),
        correct:correctAns.value
    };
    saveQ(q);
    showPopup("✏️ Updated");
    loadAdmin();
}

function deleteQuestion(){
    if(selectedIndex===null)return showPopup("Select first");

    let q=getQ();
    q.splice(selectedIndex,1);
    saveQ(q);
    selectedIndex=null;
    showPopup("❌ Deleted");
    loadAdmin();
}

// game
let quiz=[],i=0,score=0,answers=[],timer,t=10;

function startGame(){
    if(!playerName.value){showPopup("Enter name");return;}

    setRandomBackground();
    showPopup("🎮 Start");

    quiz=getQ();
    if(quiz.length==0){
        quiz=[{question:"Test?",answers:["Yes","No"],correct:"Yes"}];
    }

    startScreen.style.display="none";
    quizScreen.style.display="block";

    i=0;score=0;answers=[];
    nextQ();
}

function nextQ(){
    setRandomBackground();

    clearInterval(timer);
    t=10;

    timer=setInterval(()=>{
        timer.innerText="Time:"+t;
        timerFill.style.width=(t/10)*100+"%";
        t--;
        if(t<0){
            clearInterval(timer);
            answers.push("No Answer");
            next();
        }
    },1000);

    let q=quiz[i];
    question.innerText=q.question;

    answers.innerHTML=q.answers.map(a=>
        `<button onclick="check('${a}')">${a}</button>`
    ).join("");
}

function check(ans){
    let btns=document.querySelectorAll("#answers button");

    btns.forEach(b=>{
        if(b.innerText===quiz[i].correct)b.classList.add("correct");
        if(b.innerText===ans && ans!==quiz[i].correct)b.classList.add("wrong");
        b.disabled=true;
    });

    answers.push(ans);

    if(ans===quiz[i].correct){score++;correctSound.play();}
    else{wrongSound.play();}

    setTimeout(next,1000);
}

function next(){
    i++;
    if(i<quiz.length)nextQ();
    else endGame();
}

function endGame(){
    let percent=Math.round((score/quiz.length)*100);

    let html=`<h2>${score}/${quiz.length}</h2><h3>${percent}%</h3>`;

    if(percent===100){
        html+="🎉 PERFECT!";
        for(let i=0;i<50;i++){
            let c=document.createElement("div");
            c.style.position="fixed";
            c.style.width="10px";
            c.style.height="10px";
            c.style.background=`hsl(${Math.random()*360},100%,50%)`;
            c.style.left=Math.random()*100+"%";
            c.style.top="-10px";
            c.style.animation="fall 3s linear";
            document.body.appendChild(c);
            setTimeout(()=>c.remove(),3000);
        }
    }

    quiz.forEach((q,idx)=>{
        let user=answers[idx]||"No Answer";
        let ok=user===q.correct;

        html+=`<div style="background:${ok?'green':'red'};margin:10px;padding:10px;border-radius:10px;">
        ${q.question}<br>
        You: ${user} ${ok?'✅':'❌'}<br>
        Correct: ${q.correct}
        </div>`;
    });

    question.innerHTML=html;
    answers.innerHTML="";
}

// nav
function openAdmin(){
    startScreen.style.display="none";
    adminLogin.style.display="block";
}
function checkAdmin(){
    if(adminPass.value==="tylor"){
        adminLogin.style.display="none";
        adminPanel.style.display="block";
        loadAdmin();
    }else showPopup("Wrong");
}
function goHome(){
    adminPanel.style.display="none";
    startScreen.style.display="block";
}
</script>

</body>
</html>
