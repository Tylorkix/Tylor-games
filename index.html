<!DOCTYPE html>
<html>
<head>
<title>Quiz Game</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin:0;
    color:white;
    background-size:cover;
    transition:background 1s;
}

body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;
    left:0;
    z-index:-1;
}

.box{
    background:white;
    color:black;
    padding:20px;
    width:420px;
    margin:40px auto;
    border-radius:15px;
}

button{
    margin:8px;
    padding:10px;
    width:80%;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}

input{
    padding:8px;
    width:80%;
    margin:5px;
}

/* 🚀 Pulsing Button */
.deploy-btn{
    border-radius:25px;
    background:linear-gradient(135deg,#6a5af9,#8b7bff);
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px #6a5af9;}
    50%{box-shadow:0 0 25px #8b7bff;}
    100%{box-shadow:0 0 10px #6a5af9;}
}

/* leaderboard */
#leaderboardBox{
    display:none;
    opacity:0;
    transform:translateY(20px);
    transition:0.5s;
}
#leaderboardBox.show{
    display:block;
    opacity:1;
    transform:translateY(0);
}

.player{
    display:flex;
    justify-content:space-between;
    padding:5px;
}

.avatar{
    background:#6a5af9;
    color:white;
    border-radius:50%;
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* admin */
#adminBtn{
    position:fixed;
    top:10px;
    left:10px;
    background:black;
    color:white;
    width:auto;
}

/* music button */
#musicToggle{
    position:fixed;
    top:10px;
    right:10px;
    width:auto;
}
</style>
</head>

<body>

<button id="adminBtn" onclick="openAdmin()">👑 Admin</button>
<button id="musicToggle" onclick="toggleMusic()">🔇 Music Off</button>

<!-- START -->
<div class="box" id="startScreen">
    <h2>Enter Name</h2>
    <input id="playerName">
    <button onclick="startGame()">Start Game</button>

    <button class="deploy-btn" onclick="toggleLeaderboard(event)">
        🚀 View Friends Results
    </button>

    <div id="leaderboardBox">
        <h3>🏆 Leaderboard</h3>
        <div id="leaderboard"></div>
    </div>
</div>

<!-- QUIZ -->
<div class="box" id="quizScreen" style="display:none;">
    <h3 id="timer">Time:10</h3>
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<!-- ADMIN LOGIN -->
<div class="box" id="adminLogin" style="display:none;">
    <h2>Admin Login</h2>
    <input type="password" id="adminPass">
    <button onclick="checkAdmin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>

    <h3>➕ Add Question</h3>
    <input id="qText" placeholder="Question"><br>
    <input id="opt1" placeholder="Option 1"><br>
    <input id="opt2" placeholder="Option 2"><br>
    <input id="opt3" placeholder="Option 3"><br>
    <input id="opt4" placeholder="Option 4"><br>
    <input id="correctAns" placeholder="Correct Answer"><br>
    <button onclick="addQuestion()">Add Question</button>

    <hr>

    <button onclick="clearLeaderboard()">🗑 Clear Leaderboard</button>

    <h3>Scores</h3>
    <div id="adminBoard"></div>

    <button onclick="goHome()">⬅ Back</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="bgMusic" src="https://files.catbox.moe/d2cjfw.m4a" loop></audio>

<script>

// 🖼️ BACKGROUND
const images=["https://files.catbox.moe/sca4v4.jpg","https://files.catbox.moe/ri4psa.jpg","https://files.catbox.moe/md9t5u.jpg"];
function setBg(){
    let r=images[Math.floor(Math.random()*images.length)];
    document.body.style.backgroundImage=`url(${r})`;
}

// 🎵 MUSIC
let musicEnabled=false;

function toggleMusic(){
    let m=document.getElementById("bgMusic");

    musicEnabled=!musicEnabled;

    if(musicEnabled){
        m.play().catch(()=>{});
        document.getElementById("musicToggle").innerText="🔊 Music On";
    }else{
        m.pause();
        document.getElementById("musicToggle").innerText="🔇 Music Off";
    }
}

// QUIZ STORAGE
let quiz=[];

function loadQuestions(){
    let saved=JSON.parse(localStorage.getItem("questions"));
    if(saved && saved.length>0){
        quiz=saved;
    }else{
        quiz=[{
            question:"Favorite color?",
            answers:["Red","Blue","Black"],
            correct:"Black"
        }];
    }
}

// GAME
let player="",score=0,current=0,timer,timeLeft=10,userAnswers=[];

function startGame(){
    player=document.getElementById("playerName").value;
    if(!player){alert("Enter name");return;}

    loadQuestions();

    document.getElementById("startScreen").style.display="none";
    document.getElementById("quizScreen").style.display="block";

    current=0;
    score=0;
    userAnswers=[];

    setBg();

    if(musicEnabled){
        let m=document.getElementById("bgMusic");
        m.currentTime=0;
        m.play().catch(()=>{});
    }

    loadQuestion();
}

function loadQuestion(){
    clearInterval(timer);
    startTimer();

    let q=quiz[current];
    document.getElementById("question").innerText=q.question;

    let html="";
    q.answers.forEach(a=>{
        html+=`<button onclick="check('${a}')">${a}</button>`;
    });

    document.getElementById("answers").innerHTML=html;
}

function startTimer(){
    timeLeft=10;
    document.getElementById("timer").innerText="Time:"+timeLeft;

    timer=setInterval(()=>{
        timeLeft--;
        document.getElementById("timer").innerText="Time:"+timeLeft;

        if(timeLeft===0){
            clearInterval(timer);
            userAnswers.push("No Answer");
            next();
        }
    },1000);
}

function check(ans){
    clearInterval(timer);
    userAnswers.push(ans);

    if(ans===quiz[current].correct){
        score++;
        correctSound.play();
    }else{
        wrongSound.play();
    }

    setTimeout(next,800);
}

function next(){
    current++;
    if(current<quiz.length){
        loadQuestion();
    }else{
        endGame();
    }
}

function endGame(){
    document.getElementById("bgMusic").pause();

    let result="<h3>Score: "+score+"</h3><h4>Answers:</h4>";

    quiz.forEach((q,i)=>{
        result+=`
        <p>
        ${q.question}<br>
        You: ${userAnswers[i]}<br>
        Correct: ${q.correct}
        </p>`;
    });

    document.getElementById("question").innerHTML="Game Over";
    document.getElementById("answers").innerHTML=result;

    saveScore(player,score);
    showLeaderboard();
}

// LEADERBOARD
function saveScore(name,score){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.push({name,score});
    localStorage.setItem("scores",JSON.stringify(scores));
}

function showLeaderboard(){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.sort((a,b)=>b.score-a.score);

    let html="";
    scores.forEach((s,i)=>{
        let medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
        html+=`
        <div class="player">
            <div class="avatar">${s.name[0]}</div>
            <div>${medal} ${i+1}. ${s.name} - ${s.score}</div>
        </div>`;
    });

    document.getElementById("leaderboard").innerHTML=html;
}

function toggleLeaderboard(e){
    let box=document.getElementById("leaderboardBox");

    if(box.classList.contains("show")){
        box.classList.remove("show");
        e.target.innerText="🚀 View Friends Results";
    }else{
        box.classList.add("show");
        e.target.innerText="❌ Hide Results";
    }
}

// ADMIN
function openAdmin(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("adminLogin").style.display="block";
}

function checkAdmin(){
    let pass=document.getElementById("adminPass").value;
    if(pass==="tylor"){
        document.getElementById("adminLogin").style.display="none";
        document.getElementById("adminPanel").style.display="block";
        loadAdminBoard();
    }else{
        alert("Wrong password");
    }
}

function addQuestion(){
    let q=document.getElementById("qText").value;
    let o1=document.getElementById("opt1").value;
    let o2=document.getElementById("opt2").value;
    let o3=document.getElementById("opt3").value;
    let o4=document.getElementById("opt4").value;
    let correct=document.getElementById("correctAns").value;

    let questions=JSON.parse(localStorage.getItem("questions"))||[];

    questions.push({
        question:q,
        answers:[o1,o2,o3,o4].filter(a=>a!==""),
        correct:correct
    });

    localStorage.setItem("questions",JSON.stringify(questions));
    alert("Question Added!");
}

function loadAdminBoard(){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];

    let html="";
    scores.forEach((s,i)=>{
        html+=`${s.name} - ${s.score} <button onclick="deleteScore(${i})">❌</button><br>`;
    });

    document.getElementById("adminBoard").innerHTML=html;
}

function deleteScore(i){
    let scores=JSON.parse(localStorage.getItem("scores"))||[];
    scores.splice(i,1);
    localStorage.setItem("scores",JSON.stringify(scores));
    loadAdminBoard();
}

function clearLeaderboard(){
    localStorage.removeItem("scores");
    loadAdminBoard();
}

function goHome(){
    document.getElementById("adminPanel").style.display="none";
    document.getElementById("startScreen").style.display="block";
}

// INIT
setBg();
showLeaderboard();

</script>

</body>
</html>
