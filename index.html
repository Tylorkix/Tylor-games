<!DOCTYPE html>
<html>
<head>
    <title>How Well Do You Know Me?</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            color: white;

            /* Background image settings */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
        }

        /* DARK OVERLAY */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        .box {
            background: rgba(255,255,255,0.9);
            color: black;
            padding: 20px;
            margin: 40px auto;
            width: 420px;
            border-radius: 15px;
        }

        button {
            margin: 10px;
            padding: 10px;
            width: 80%;
            border: none;
            border-radius: 8px;
            background-color: #4facfe;
            color: white;
            cursor: pointer;
        }

        input {
            padding: 10px;
            width: 80%;
        }

        #timer {
            color: red;
        }

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
        }

        #musicToggle {
            position: fixed;
            top: 10px;
            right: 10px;
            width: auto;
            padding: 8px;
        }
    </style>
</head>

<body>

<!-- MUSIC POPUP -->
<div class="popup" id="musicPopup">
    <div class="popup-box">
        <h2>🎵 Enable Music?</h2>
        <button onclick="setMusic(true)">Yes</button>
        <button onclick="setMusic(false)">No</button>
    </div>
</div>

<!-- MUSIC TOGGLE -->
<button id="musicToggle" onclick="toggleMusic()" style="display:none;">🔇 Music Off</button>

<!-- START SCREEN -->
<div class="box" id="startScreen">
    <h2>Enter Your Name</h2>
    <input type="text" id="playerName" placeholder="Your name">
    <button onclick="startGame()">Start Game</button>

    <h3>🏆 Leaderboard</h3>
    <div id="leaderboard"></div>
</div>

<!-- QUIZ -->
<div class="box" id="quizScreen" style="display:none;">
    <h3 id="timer">Time: 10</h3>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="feedback"></p>
    <p id="score"></p>
</div>

<!-- SOUND EFFECTS -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<!-- BACKGROUND MUSIC -->
<audio id="bgMusic" src="https://files.catbox.moe/d2cjfw.m4a" loop></audio>

<script>
// 🖼️ IMAGE LIST (use local folder OR URLs)
const images = [
    "https://files.catbox.moe/sca4v4.jpg",
    "https://files.catbox.moe/ri4psa.jpg",
    "https://files.catbox.moe/md9t5u.jpg"
];

// RANDOM BACKGROUND
function setRandomBackground() {
    let random = images[Math.floor(Math.random() * images.length)];
    document.body.style.backgroundImage = `url(${random})`;
}

// MUSIC CONTROL
let musicEnabled = false;

function setMusic(choice) {
    musicEnabled = choice;
    document.getElementById("musicPopup").style.display = "none";
    document.getElementById("musicToggle").style.display = "block";
    updateMusicButton();
}

function toggleMusic() {
    musicEnabled = !musicEnabled;
    let music = document.getElementById("bgMusic");

    if (musicEnabled) {
        music.play().catch(()=>{});
    } else {
        music.pause();
    }

    updateMusicButton();
}

function updateMusicButton() {
    document.getElementById("musicToggle").innerText =
        musicEnabled ? "🔊 Music On" : "🔇 Music Off";
}

// QUIZ DATA
const quiz = [
    {
        question: "What is my favorite color?",
        answers: ["Red", "Blue", "Black", "Green"],
        correct: "Black"
    },
    {
        question: "What food do I love most?",
        answers: ["Pizza", "Ugali", "Fries", "Rice"],
        correct: "Ugali"
    },
    {
        question: "What do I hate the most?",
        answers: ["Noise", "Cold weather", "Waking up early", "Traffic"],
        correct: "Waking up early"
    }
];

let player = "";
let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 10;
let userAnswers = [];

// START GAME
function startGame() {
    player = document.getElementById("playerName").value;

    if (player.trim() === "") {
        alert("Enter your name!");
        return;
    }

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    setRandomBackground();

    if (musicEnabled) {
        let music = document.getElementById("bgMusic");
        music.currentTime = 0;
        music.play().catch(()=>{});
    }

    loadQuestion();
}

// TIMER
function startTimer() {
    timeLeft = 10;
    document.getElementById("timer").innerText = "Time: " + timeLeft;

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = "Time: " + timeLeft;

        if (timeLeft === 0) {
            clearInterval(timer);
            userAnswers.push("No Answer");
            showFeedback("⏰ Time's up!", "orange");
            setTimeout(nextQuestion, 1000);
        }
    }, 1000);
}

// LOAD QUESTION
function loadQuestion() {
    clearInterval(timer);
    startTimer();

    let q = quiz[currentQuestion];
    document.getElementById("question").innerText = q.question;
    document.getElementById("feedback").innerText = "";

    let html = "";
    q.answers.forEach(a => {
        html += `<button onclick="checkAnswer('${a}')">${a}</button>`;
    });

    document.getElementById("answers").innerHTML = html;
}

// CHECK ANSWER
function checkAnswer(ans) {
    clearInterval(timer);
    userAnswers.push(ans);

    if (ans === quiz[currentQuestion].correct) {
        score++;
        document.getElementById("correctSound").play();
        showFeedback("✅ Correct!", "green");
    } else {
        document.getElementById("wrongSound").play();
        showFeedback("❌ Wrong!", "red");
    }

    setTimeout(nextQuestion, 1000);
}

// FEEDBACK
function showFeedback(msg, color) {
    let fb = document.getElementById("feedback");
    fb.innerText = msg;
    fb.style.color = color;
}

// NEXT QUESTION
function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < quiz.length) {
        loadQuestion();
    } else {
        endGame();
    }
}

// END GAME
function endGame() {
    document.getElementById("bgMusic").pause();

    document.getElementById("question").innerText = "🎉 Game Over!";
    document.getElementById("answers").innerHTML = "";
    document.getElementById("timer").innerText = "";

    let html = `<h3>${player}, Score: ${score}/${quiz.length}</h3><hr>`;

    quiz.forEach((q, i) => {
        html += `
        <p>
        <strong>${q.question}</strong><br>
        Your Answer: ${userAnswers[i]}<br>
        Correct Answer: ${q.correct}
        </p><hr>`;
    });

    document.getElementById("score").innerHTML = html;

    saveScore(player, score);
    showLeaderboard();
}

// LEADERBOARD
function saveScore(name, score) {
    let scores = JSON.parse(localStorage.getItem("scores")) || [];
    scores.push({name, score});
    localStorage.setItem("scores", JSON.stringify(scores));
}

function showLeaderboard() {
    let scores = JSON.parse(localStorage.getItem("scores")) || [];
    let html = "";

    scores.slice(-5).reverse().forEach(s => {
        html += `<p>${s.name}: ${s.score}</p>`;
    });

    document.getElementById("leaderboard").innerHTML = html;
}

// INIT
setRandomBackground();
showLeaderboard();

</script>

</body>
</html>
