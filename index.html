<!DOCTYPE html>
<html>
<head>
<title>Ultimate Quiz Game</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin:0;
    color:white;
    background-size:cover;
    background-position:center;
}

body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;
    left:0;
    z-index:-1;
}

.box{
    background:white;
    color:black;
    padding:20px;
    width:420px;
    margin:40px auto;
    border-radius:15px;
}

/* buttons */
button{
    margin:8px;
    padding:12px;
    width:85%;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#6a5af9,#8b7bff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{opacity:0.9;}

/* highlight selected question */
.selected{
    background:#ffeaa7;
    padding:5px;
    border-radius:5px;
}

/* neon popup */
#neonPopup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:black;
    color:#00fff7;
    padding:20px 40px;
    border-radius:12px;
    font-size:20px;
    box-shadow:0 0 10px #00fff7,0 0 25px #00fff7;
    opacity:0;
    transition:0.4s;
}
#neonPopup.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

input{
    padding:10px;
    width:85%;
    margin:5px;
}

/* top buttons */
#adminBtn{position:fixed;top:10px;left:10px;width:auto;}
#musicToggle{position:fixed;top:10px;right:10px;width:auto;}
</style>
</head>

<body>

<button id="adminBtn" onclick="openAdmin()">👑 Admin</button>
<button id="musicToggle" onclick="toggleMusic()">🔇 Music</button>

<div id="neonPopup"></div>

<!-- START -->
<div class="box" id="startScreen">
    <h2>Enter Name</h2>
    <input id="playerName">
    <button onclick="startGame()">Start Game</button>
</div>

<!-- QUIZ -->
<div class="box" id="quizScreen" style="display:none;">
    <h3 id="timer"></h3>
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<!-- ADMIN LOGIN -->
<div class="box" id="adminLogin" style="display:none;">
    <h2>Admin Login</h2>
    <input id="adminPass" type="password">
    <button onclick="checkAdmin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>

    <input id="qText" placeholder="Question">
    <input id="opt1" placeholder="Option 1">
    <input id="opt2" placeholder="Option 2">
    <input id="opt3" placeholder="Option 3">
    <input id="opt4" placeholder="Option 4">
    <input id="correctAns" placeholder="Correct Answer">

    <button onclick="addQuestion()">Add Another Quiz</button>
    <button onclick="editQuestion()">Edit Selected Quiz</button>
    <button onclick="deleteQuestion()">Delete Selected Quiz</button>

    <h3>📋 Click Question to Edit</h3>
    <div id="questionList"></div>

    <button onclick="goHome()">Back</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="bgMusic" src="https://files.catbox.moe/d2cjfw.m4a" loop></audio>

<script>

// backgrounds
const backgrounds=[
"https://files.catbox.moe/sca4v4.jpg",
"https://files.catbox.moe/ri4psa.jpg",
"https://files.catbox.moe/md9t5u.jpg"
];
function setRandomBackground(){
    document.body.style.backgroundImage=
    `url(${backgrounds[Math.floor(Math.random()*backgrounds.length)]})`;
}

// popup
function showPopup(msg){
    neonPopup.innerText=msg;
    neonPopup.classList.add("show");
    setTimeout(()=>neonPopup.classList.remove("show"),2000);
}

// music
let musicOn=false;
function toggleMusic(){
    musicOn=!musicOn;
    if(musicOn){bgMusic.play();showPopup("🎵 Music On")}
    else{bgMusic.pause();showPopup("🔇 Music Off")}
}

// storage
function getQ(){return JSON.parse(localStorage.getItem("questions"))||[];}
function saveQ(q){localStorage.setItem("questions",JSON.stringify(q));}

let selectedIndex=null;

// admin list
function loadAdmin(){
    let q=getQ();
    let html="";
    q.forEach((item,i)=>{
        html+=`<p onclick="selectQuestion(${i})"
        class="${i===selectedIndex?'selected':''}">
        ${i+1}. ${item.question}
        </p>`;
    });
    questionList.innerHTML=html;
}

// select question
function selectQuestion(i){
    let q=getQ();
    selectedIndex=i;

    let item=q[i];
    qText.value=item.question;
    opt1.value=item.answers[0]||"";
    opt2.value=item.answers[1]||"";
    opt3.value=item.answers[2]||"";
    opt4.value=item.answers[3]||"";
    correctAns.value=item.correct;

    loadAdmin();
    showPopup("✏️ Question loaded");
}

// add
function addQuestion(){
    let q=getQ();
    q.push({
        question:qText.value,
        answers:[opt1.value,opt2.value,opt3.value,opt4.value].filter(a=>a!=""),
        correct:correctAns.value
    });
    saveQ(q);
    showPopup("✨ Question added!");
    loadAdmin();
}

// edit selected
function editQuestion(){
    if(selectedIndex===null){
        showPopup("Select a question first");
        return;
    }

    let q=getQ();
    q[selectedIndex]={
        question:qText.value,
        answers:[opt1.value,opt2.value,opt3.value,opt4.value].filter(a=>a!=""),
        correct:correctAns.value
    };

    saveQ(q);
    showPopup("✏️ Updated!");
    loadAdmin();
}

// delete selected
function deleteQuestion(){
    if(selectedIndex===null){
        showPopup("Select a question first");
        return;
    }

    let q=getQ();
    q.splice(selectedIndex,1);
    saveQ(q);

    selectedIndex=null;
    showPopup("❌ Deleted!");
    loadAdmin();
}

// game
let quiz=[],i=0,score=0,answers=[],timer,t=10;

function startGame(){
    let name=playerName.value;
    if(!name){showPopup("⚠️ Enter your name");return;}

    showPopup("🎮 Game Started");
    setRandomBackground();

    quiz=getQ();
    if(quiz.length==0){
        quiz=[{question:"Test?",answers:["Yes","No"],correct:"Yes"}];
    }

    startScreen.style.display="none";
    quizScreen.style.display="block";

    i=0;score=0;answers=[];
    nextQ();
}

function nextQ(){
    clearInterval(timer);
    t=10;

    timer=setInterval(()=>{
        document.getElementById("timer").innerText="Time:"+t;
        t--;
        if(t<0){
            clearInterval(timer);
            answers.push("No Answer");
            next();
        }
    },1000);

    let q=quiz[i];
    question.innerText=q.question;

    answers.innerHTML=q.answers.map(a=>
        `<button onclick="check('${a}')">${a}</button>`
    ).join("");
}

function check(a){
    answers.push(a);
    if(a==quiz[i].correct){score++;correctSound.play();}
    else{wrongSound.play();}
    next();
}

function next(){
    i++;
    if(i<quiz.length)nextQ();
    else endGame();
}

function endGame(){
    bgMusic.pause();

    let percent=Math.round((score/quiz.length)*100);

    let result=`<h2>${score}/${quiz.length}</h2><h3>${percent}%</h3>`;

    if(percent===100){result+="🥇 PERFECT!";}

    quiz.forEach((q,index)=>{
        let user=answers[index]||"No Answer";
        let ok=user===q.correct;

        result+=`<div style="background:${ok?'green':'red'};padding:10px;margin:10px;border-radius:10px;">
        ${q.question}<br>
        You: ${user} ${ok?'✅':'❌'}<br>
        Correct: ${q.correct}
        </div>`;
    });

    question.innerHTML=result;
    answers.innerHTML="";
}

// nav
function openAdmin(){
    startScreen.style.display="none";
    adminLogin.style.display="block";
}
function checkAdmin(){
    if(adminPass.value==="tylor"){
        adminLogin.style.display="none";
        adminPanel.style.display="block";
        loadAdmin();
    }else showPopup("Wrong password");
}
function goHome(){
    adminPanel.style.display="none";
    startScreen.style.display="block";
}

// init
setRandomBackground();

</script>

</body>
</html>
