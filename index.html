<!DOCTYPE html>
<html>
<head>
<title>Ultimate Quiz Game</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    margin:0;
    color:white;
    background-size:cover;
    background-position:center;
}

body::after{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;
    left:0;
    z-index:-1;
}

.box{
    background:white;
    color:black;
    padding:20px;
    width:420px;
    margin:40px auto;
    border-radius:15px;
}

button{
    margin:5px;
    padding:10px;
    width:80%;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.blue{background:#4facfe;}
.red{background:#ff4d4d;}
.yellow{background:#f7b731;color:black;}
.green{background:#20bf6b;}

input{
    padding:8px;
    width:80%;
    margin:5px;
}

/* neon popup */
#neonPopup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    background:black;
    color:#00fff7;
    padding:20px 40px;
    border-radius:12px;
    font-size:20px;
    box-shadow:0 0 10px #00fff7,0 0 25px #00fff7,0 0 40px #00fff7;
    opacity:0;
    transition:0.4s;
}
#neonPopup.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

/* confetti */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall 3s linear infinite;
}
@keyframes fall{
    to{transform:translateY(100vh);}
}

/* admin buttons */
#adminBtn{position:fixed;top:10px;left:10px;background:black;}
#musicToggle{position:fixed;top:10px;right:10px;}
</style>
</head>

<body>

<button id="adminBtn" onclick="openAdmin()">👑 Admin</button>
<button id="musicToggle" onclick="toggleMusic()">🔇 Music</button>

<div id="neonPopup"></div>

<!-- START -->
<div class="box" id="startScreen">
    <h2>Enter Name</h2>
    <input id="playerName">
    <button class="green" onclick="startGame()">Start Game</button>
</div>

<!-- QUIZ -->
<div class="box" id="quizScreen" style="display:none;">
    <h3 id="timer"></h3>
    <h2 id="question"></h2>
    <div id="answers"></div>
</div>

<!-- ADMIN LOGIN -->
<div class="box" id="adminLogin" style="display:none;">
    <h2>Admin Login</h2>
    <input id="adminPass" type="password">
    <button onclick="checkAdmin()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box" id="adminPanel" style="display:none;">
    <h2>Admin Panel</h2>

    <input id="qText" placeholder="Question">
    <input id="opt1" placeholder="Option 1">
    <input id="opt2" placeholder="Option 2">
    <input id="opt3" placeholder="Option 3">
    <input id="opt4" placeholder="Option 4">
    <input id="correctAns" placeholder="Correct Answer">

    <button class="blue" onclick="addQuestion()">Add Another Quiz</button>
    <button class="yellow" onclick="editQuestion()">Edit Quiz</button>
    <button class="red" onclick="deleteQuestion()">Delete Quiz</button>

    <div id="questionList"></div>

    <button onclick="goHome()">Back</button>
</div>

<!-- AUDIO -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="bgMusic" src="https://files.catbox.moe/d2cjfw.m4a" loop></audio>

<script>

// 🖼️ RANDOM BACKGROUNDS
const backgrounds = [
"https://files.catbox.moe/md9t5u.jpg",
"https://files.catbox.moe/ri4psa.jpg",
"https://files.catbox.moe/sca4v4.jpg",
"https://files.catbox.moe/36rpa7.jpg"
];

function setRandomBackground(){
    let random = backgrounds[Math.floor(Math.random()*backgrounds.length)];
    document.body.style.backgroundImage = `url('${random}')`;
}

// popup
function showPopup(msg){
    let p=document.getElementById("neonPopup");
    p.innerText=msg;
    p.classList.add("show");
    setTimeout(()=>p.classList.remove("show"),2000);
}

// confetti
function confetti(){
    for(let i=0;i<50;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"%";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}

// music
let musicOn=false;
function toggleMusic(){
    musicOn=!musicOn;
    if(musicOn){bgMusic.play();showPopup("🎵 Music On")}
    else{bgMusic.pause();showPopup("🔇 Music Off")}
}

// storage
function getQ(){return JSON.parse(localStorage.getItem("questions"))||[];}
function saveQ(q){localStorage.setItem("questions",JSON.stringify(q));}

// admin
function addQuestion(){
    let q=getQ();
    q.push({
        question:qText.value,
        answers:[opt1.value,opt2.value,opt3.value,opt4.value].filter(a=>a!=""),
        correct:correctAns.value
    });
    saveQ(q);
    showPopup("✨ Question added!");
    loadAdmin();
}
function editQuestion(){
    let q=getQ();
    if(q.length==0)return;
    q[0]={question:qText.value,answers:[opt1.value,opt2.value,opt3.value,opt4.value],correct:correctAns.value};
    saveQ(q);
    showPopup("✏️ Edited!");
    loadAdmin();
}
function deleteQuestion(){
    let q=getQ();
    q.pop();
    saveQ(q);
    showPopup("❌ Deleted!");
    loadAdmin();
}
function loadAdmin(){
    let q=getQ();
    let html="";
    q.forEach((x,i)=>html+=`<p>${i+1}. ${x.question}</p>`);
    questionList.innerHTML=html;
}

// game
let quiz=[],i=0,score=0,answers=[],timer,t=10;

function startGame(){
    let name=playerName.value;
    if(!name){showPopup("⚠️ Enter your name");return;}

    showPopup("🎮 Game Started");

    setRandomBackground(); // 🔥 change background on start

    quiz=getQ();
    if(quiz.length==0){
        quiz=[{question:"Test?",answers:["Yes","No"],correct:"Yes"}];
    }

    startScreen.style.display="none";
    quizScreen.style.display="block";

    i=0;score=0;answers=[];
    nextQ();
}

function nextQ(){
    clearInterval(timer);
    t=10;
    timer=setInterval(()=>{
        document.getElementById("timer").innerText="Time:"+t;
        t--;
        if(t<0){clearInterval(timer);answers.push("No Answer");next();}
    },1000);

    let q=quiz[i];
    question.innerText=q.question;

    let html="";
    q.answers.forEach(a=>{
        html+=`<button onclick="check('${a}')">${a}</button>`;
    });
    document.getElementById("answers").innerHTML=html;
}

function check(a){
    answers.push(a);
    if(a==quiz[i].correct){score++;correctSound.play();}
    else{wrongSound.play();}
    next();
}

function next(){
    i++;
    if(i<quiz.length)nextQ();
    else endGame();
}

function endGame(){
    bgMusic.pause();

    let percent=Math.round((score/quiz.length)*100);

    let result=`<h2>Score: ${score}/${quiz.length}</h2>
                <h3>${percent}%</h3>`;

    if(percent===100){
        result+=`<h2>🥇 PERFECT SCORE!</h2>`;
        confetti();
    }

    result+="<h3>Results:</h3>";

    quiz.forEach((q,index)=>{
        let user=answers[index]||"No Answer";
        let correct=q.correct;
        let ok=user===correct;

        result+=`
        <div style="margin:10px;padding:10px;border-radius:10px;
        background:${ok?'#20bf6b':'#ff4d4d'};">
        ${q.question}<br>
        You: ${user} ${ok?'✅':'❌'}<br>
        Correct: ${correct}
        </div>`;
    });

    document.getElementById("question").innerHTML=result;
    document.getElementById("answers").innerHTML="";
}

// admin nav
function openAdmin(){
    startScreen.style.display="none";
    adminLogin.style.display="block";
}
function checkAdmin(){
    if(adminPass.value==="tylor"){
        adminLogin.style.display="none";
        adminPanel.style.display="block";
        loadAdmin();
    }else showPopup("Wrong password");
}
function goHome(){
    adminPanel.style.display="none";
    startScreen.style.display="block";
}

// 🔥 LOAD BACKGROUND ON PAGE LOAD
setRandomBackground();

</script>

</body>
</html>
